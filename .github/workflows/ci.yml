name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── API: lint + unit tests ─────────────────────────────────────────────────
  api-test:
    name: API Tests (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install
        working-directory: apps/api

      - name: Generate Prisma client
        run: npx prisma generate --schema prisma/schema.prisma
        working-directory: apps/api

      - name: Run tests
        run: npm test
        working-directory: apps/api
        env:
          # Tests that require a real DB are skipped when DATABASE_URL is absent.
          # Unit tests (calibration, CLV, EV, etc.) run without a DB.
          NODE_ENV: test

  # ─── Prediction worker: Python tests ────────────────────────────────────────
  worker-test:
    name: Prediction Worker Tests (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/prediction-worker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: services/prediction-worker

      - name: Run Poisson tests
        run: python -m unittest discover -v
        working-directory: services/prediction-worker

  # ─── Web: Next.js build check ────────────────────────────────────────────────
  web-build:
    name: Web Build Check (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install all workspace dependencies
        run: npm install

      - name: Build Next.js app
        run: npm run build -w apps/web
        env:
          # Provide a placeholder so the build doesn't fail on missing env var
          NEXT_PUBLIC_API_URL: https://placeholder.example.com

  # ─── Post-deploy smoke test (main branch only) ───────────────────────────────
  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: [api-test, worker-test, web-build]
    # Only run on main branch pushes when API_URL secret is configured
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run smoke test against production API
        run: node apps/api/scripts/smoke-test.js
        env:
          API_URL: ${{ secrets.PRODUCTION_API_URL }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
        # Don't fail the workflow if the secret isn't configured yet
        continue-on-error: true
